naftiko: 1.0.0-alpha2
info:
  label: Nubela Proxycurl API — Competitor
  description: 'Nubela Proxycurl API — Competitor. 1 operations. Lead operation: List competing companies for a target company.
    Self-contained Naftiko capability covering one Nubela business surface.'
  tags:
  - Nubela
  - Competitor
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    NUBELA_API_KEY: NUBELA_API_KEY
capability:
  consumes:
  - type: http
    namespace: nubela-competitor
    baseUri: https://nubela.co/proxycurl/api
    description: Nubela Proxycurl API — Competitor business capability. Self-contained, no shared references.
    resources:
    - name: competitor-listing
      path: /competitor/listing
      operations:
      - name: listcompetitors
        method: GET
        description: List competing companies for a target company
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.NUBELA_API_KEY}}'
  exposes:
  - type: rest
    namespace: nubela-competitor-rest
    port: 8080
    description: REST adapter for Nubela Proxycurl API — Competitor. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/competitor/listing
      name: competitor-listing
      description: REST surface for competitor-listing.
      operations:
      - method: GET
        name: listcompetitors
        description: List competing companies for a target company
        call: nubela-competitor.listcompetitors
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: nubela-competitor-mcp
    port: 9090
    transport: http
    description: MCP adapter for Nubela Proxycurl API — Competitor. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-competing-companies-target-company
      description: List competing companies for a target company
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: nubela-competitor.listcompetitors
      outputParameters:
      - type: object
        mapping: $.
